name: emscode_sim_vitals
description: "EMSCodeSim Vitals training app for EMT and paramedic assessment practice."
publish_to: "none"

version: 1.0.2+1

environment:
  sdk: ^3.6.0
dependencies:
  shared_preferences: ^2.0.0
  flutter_tts: ^4.0.0
  audioplayers: ^6.0.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  go_router: ^16.2.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/audio/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/emscodesim_app_icon_1024.png
  remove_alpha_ios: true
